<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Memory Game Studenti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main class="py-4">
        <div class="container">
            <h1 class="text-center mb-4">Memory Game Studenti</h1>

            <div class="text-center mb-3">
                <p class="mb-2">Trova tutte le coppie</p>

                <div class="mb-3">
                    <button class="btn btn-outline-success difficulty-btn" data-pairs="8">Facile 4x4</button>
                    <button class="btn btn-outline-warning difficulty-btn" data-pairs="18">Medio 6x6</button>
                </div>

                <button id="restart-btn" class="btn btn-primary">Ricomincia</button>
            </div>

            <div id="timer" class="text-center mb-3"></div>
            <div class="board"></div>
            <div id="message" class="text-center mt-4 fw-bold"></div>
        </div>
    </main>

    <script src="./scripts/studentsInfo.js"></script>
    <script src="./scripts/memory.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
